<!DOCTYPE html>
<html lang="fr" class="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arts Alu | Catalogue Premium</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --canvas: #08080a;
            --card: #0f1014;
            --card-hover: #16181d;
            --text-main: #fcfcfd;
            --text-muted: #94a3b8;
            --border: rgba(255, 255, 255, 0.04);
            --border-hover: rgba(99, 102, 241, 0.5);
            --indigo: #6366f1;
            --indigo-soft: rgba(99, 102, 241, 0.1);
            --emerald: #10b981;
            --emerald-soft: rgba(16, 185, 129, 0.1);
            --glass: rgba(10, 10, 14, 0.9);
            --shadow: 0 20px 50px -12px rgba(0, 0, 0, 0.6);
        }

        body.light-mode {
            --canvas: #f1f5f9;
            --card: #ffffff;
            --card-hover: #f8fafc;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --border: rgba(0, 0, 0, 0.06);
            --border-hover: rgba(79, 70, 229, 0.3);
            --indigo: #4f46e5;
            --indigo-soft: #eef2ff;
            --emerald: #059669;
            --emerald-soft: #ecfdf5;
            --glass: rgba(255, 255, 255, 0.95);
            --shadow: 0 20px 40px -15px rgba(100, 116, 139, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background-color: var(--canvas);
            color: var(--text-main);
            transition: background 0.4s;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }

        .glass {
            background-color: var(--glass);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border-bottom: 1px solid var(--border);
        }

        .tab-btn {
            position: relative;
            padding: 0.5rem 1.25rem;
            font-size: 0.8rem;
            font-weight: 800;
            color: var(--text-muted);
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .tab-btn.active {
            color: var(--indigo);
        }

        .tab-btn.active::after {
            content: '';
            position: absolute;
            bottom: -4px;
            left: 1rem;
            right: 1rem;
            height: 3px;
            background: var(--indigo);
            border-radius: 99px;
            box-shadow: 0 4px 12px var(--indigo);
        }

        select,
        input {
            background: var(--card) !important;
            color: var(--text-main) !important;
            border: 1px solid var(--border) !important;
            border-radius: 14px !important;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        select:focus,
        input:focus {
            border-color: var(--indigo) !important;
            outline: none !important;
            box-shadow: 0 0 0 4px var(--indigo-soft) !important;
            background: var(--card-hover) !important;
        }

        .grid-layout {
            display: grid;
            gap: 24px;
            padding: 32px;
            width: 100%;
        }

        .view-grid {
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
        }

        .view-compact {
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
        }

        .view-mini {
            grid-template-columns: repeat(auto-fill, minmax(145px, 1fr));
            gap: 16px;
        }

        .view-list {
            grid-template-columns: 1fr;
        }

        .item-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 24px;
            display: flex;
            flex-direction: column;
            transition: all 0.5s cubic-bezier(0.2, 0.8, 0.2, 1);
            position: relative;
            overflow: hidden;
            padding: 0;
            min-height: 380px;
            box-shadow: var(--shadow);
        }

        .view-compact .item-card {
            min-height: 300px;
        }

        .view-mini .item-card {
            min-height: 200px;
            border-radius: 18px;
        }

        .item-card:hover {
            transform: translateY(-8px);
            border-color: var(--border-hover);
            background: var(--card-hover);
            box-shadow: 0 40px 80px -20px rgba(0, 0, 0, 0.9);
        }

        /* LIST VIEW SPECIFIC */
        .view-list .item-card {
            min-height: 75px;
            flex-direction: row !important;
            align-items: center;
            padding: 0.5rem 1rem;
            margin-bottom: 0.5rem;
            border-radius: 12px;
            gap: 1.5rem;
        }

        .view-list .img-container {
            width: 70px;
            height: 50px;
            min-height: 50px;
            flex: none;
            padding: 0;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .view-list .card-content {
            flex-direction: row;
            align-items: center;
            padding: 0;
            gap: 1rem;
            width: 100%;
            overflow: hidden;
        }

        .view-list .mono {
            width: 45px;
            flex: none;
            margin-bottom: 0 !important;
        }

        .view-list .badge {
            width: 80px;
            flex: none;
            text-align: center;
        }

        .view-list [class*="text-indigo-500/40"] {
            width: 140px;
            flex: none;
            margin-bottom: 0 !important;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .view-list h3 {
            font-size: 0.8rem;
            flex: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-bottom: 0 !important;
        }

        .view-list .price-grid {
            margin-top: 0;
            margin-left: auto;
            border-top: 0;
            padding-top: 0;
            display: flex;
            gap: 1.5rem;
            align-items: center;
            min-width: fit-content;
        }

        .view-list .absolute.top-4.right-4 {
            position: relative;
            top: auto;
            right: auto;
            flex-direction: row !important;
            gap: 0.5rem;
            z-index: 50;
        }

        /* IMMERSIVE IMAGE CONCEPT */
        .img-container {
            flex: none;
            height: 150px;
            background: transparent;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
            transition: 0.5s cubic-bezier(0.2, 0.8, 0.2, 1);
            padding: 1.5rem;
        }

        .view-compact .img-container {
            height: 100px;
            padding: 1rem;
        }

        .view-mini .img-container {
            height: 80px;
            padding: 0.5rem;
        }

        .img-container img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            transition: transform 0.8s cubic-bezier(0.2, 0.8, 0.2, 1);
            /* ACCENTUATION MAXIMALE : EFFET NEO-BLUEPRINT */
            filter: brightness(2.2) contrast(1.5) drop-shadow(0 0 2px rgba(255, 255, 255, 0.9)) drop-shadow(0 0 10px rgba(99, 102, 241, 0.4));
        }

        .item-card:hover .img-container img {
            transform: scale(1.15) rotate(1deg);
        }

        .card-content {
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .view-mini .card-content {
            padding: 0.75rem;
            gap: 0.25rem;
        }

        .mono {
            font-family: 'JetBrains Mono', monospace;
            font-size: 9px;
            font-weight: 800;
            color: #ff3b30;
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }

        h3 {
            font-size: 0.95rem;
            font-weight: 800;
            line-height: 1.3;
            color: var(--text-main);
            letter-spacing: -0.01em;
        }

        .view-mini h3 {
            font-size: 0.7rem;
        }

        .action-btn {
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
            background: var(--indigo-soft);
            border: 1px solid var(--border);
            color: var(--indigo);
            cursor: pointer;
            transition: 0.3s;
            z-index: 50;
        }

        .view-mini .action-btn {
            width: 28px;
            height: 28px;
            border-radius: 8px;
        }

        .action-btn:hover {
            color: var(--text-main);
            border-color: var(--indigo);
            background: var(--indigo-soft);
            transform: scale(1.1);
        }

        .action-btn.active {
            background: var(--indigo);
            color: white;
            border-color: var(--indigo);
        }

        .fav-btn.active {
            background: #d97706;
            color: white;
            border-color: #d97706;
        }

        .price-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-top: 0.75rem;
            padding-top: 1rem;
            border-top: 1px solid var(--border);
        }

        .price-label {
            font-size: 7px;
            font-weight: 800;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .price-value {
            font-size: 0.9rem;
            font-weight: 700;
            opacity: 0.5;
        }

        .price-remise {
            font-size: 1.1rem;
            font-weight: 900;
            color: var(--emerald);
            text-shadow: 0 0 20px var(--emerald-soft);
        }

        .view-mini .price-remise {
            font-size: 0.85rem;
        }

        .animate-fade {
            animation: slideUp 0.6s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
            opacity: 0;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .badge {
            font-size: 7px;
            font-weight: 800;
            padding: 3px 8px;
            border-radius: 6px;
            background: var(--indigo-soft);
            color: var(--indigo);
            letter-spacing: 0.05em;
        }
    </style>
</head>

<body class="flex flex-col h-screen overflow-hidden">
    <!-- START SCREEN -->
    <div id="startOverlay"
        class="fixed inset-0 flex items-center justify-center bg-[#050507] z-[100] transition-all duration-1000">
        <div class="text-center">
            <div
                class="w-24 h-24 bg-indigo-600 rounded-[2.5rem] flex items-center justify-center shadow-[0_0_80px_rgba(99,102,241,0.3)] mb-10 mx-auto animate-pulse">
                <i data-lucide="tent" class="w-12 h-12 text-white"></i>
            </div>
            <h1 class="text-4xl font-black mb-12 tracking-tight text-white uppercase italic">Arts Alu <span
                    class="text-indigo-500">Zen</span></h1>
            <button onclick="startApp()"
                class="group relative px-16 py-6 bg-white rounded-2xl font-black text-xl hover:scale-105 transition-all shadow-[0_20px_40px_rgba(255,255,255,0.1)] active:scale-95">
                <span class="relative z-10 text-black">ACCÉDER AU CATALOGUE</span>
                <div
                    class="absolute inset-0 bg-indigo-600 rounded-2xl opacity-0 group-hover:opacity-10 transition-opacity">
                </div>
            </button>
            <p
                class="text-zinc-600 text-[10px] items-center gap-3 mt-12 flex justify-center uppercase font-black tracking-[0.3em] opacity-50">
                <i data-lucide="screen-share" class="w-4 h-4"></i> Expérience Immersive
            </p>
        </div>
    </div>

    <!-- DOUBLE ROW HEADER -->
    <header class="flex flex-col glass z-50 shrink-0">
        <div class="h-16 flex items-center justify-between px-10 border-b border-white/[0.03]">
            <div class="flex items-center gap-10">
                <div class="flex items-center gap-4">
                    <div
                        class="w-10 h-10 bg-indigo-600 rounded-2xl flex items-center justify-center shadow-lg shadow-indigo-500/20">
                        <i data-lucide="tent" class="w-5 h-5 text-white stroke-[3]"></i>
                    </div>
                    <h1 class="font-black text-xl tracking-tighter">ARTS ALU</h1>
                </div>
                <nav class="flex items-center gap-4">
                    <button class="tab-btn active" onclick="switchView('catalogue')"
                        id="tabCatalogue">Catalogue</button>
                    <button class="tab-btn" onclick="switchView('needs')" id="tabNeeds">Besoins</button>
                </nav>
            </div>

            <div class="flex items-center gap-4">
                <div class="flex items-center p-1.5 bg-white/[0.02] rounded-2xl border border-white/[0.05]">
                    <button onclick="changeViewMode('grid')" class="action-btn !bg-transparent !border-0"
                        title="Grille"><i data-lucide="layout-grid" class="w-4 h-4"></i></button>
                    <button onclick="changeViewMode('compact')" class="action-btn !bg-transparent !border-0"
                        title="Compact"><i data-lucide="layout-template" class="w-4 h-4"></i></button>
                    <button onclick="changeViewMode('mini')" class="action-btn !bg-transparent !border-0"
                        title="Mini"><i data-lucide="grid-2x2" class="w-4 h-4"></i></button>
                    <button onclick="changeViewMode('list')" class="action-btn !bg-transparent !border-0"
                        title="Liste"><i data-lucide="layout-list" class="w-4 h-4"></i></button>
                </div>
                <button id="toggleFavFilter" class="action-btn relative h-10 w-auto px-5 gap-3 rounded-2xl">
                    <i data-lucide="star" class="w-4 h-4"></i>
                    <span class="text-[10px] font-black uppercase tracking-widest">Favoris</span>
                    <span id="favCountBadge"
                        class="hidden absolute -top-1.5 -right-1.5 bg-red-500 text-[9px] w-5 h-5 flex items-center justify-center rounded-full text-white font-black border-2 border-[#050507]">0</span>
                </button>
                <button onclick="toggleFS()" class="action-btn h-10 w-10 rounded-2xl"><i data-lucide="maximize"
                        class="w-5 h-5"></i></button>
                <button id="modeToggle" class="action-btn h-10 w-10 rounded-2xl"><i data-lucide="sparkles"
                        class="w-5 h-5"></i></button>
                <div class="ml-6 pl-6 border-l border-white/5 text-right">
                    <span id="matchCount" class="text-2xl font-black text-indigo-500 block leading-none">0</span>
                    <span class="text-[7px] block font-black text-muted uppercase tracking-[0.2em] mt-1">Articles</span>
                </div>
            </div>
        </div>

        <div class="h-16 flex items-center px-10 gap-6 bg-white/[0.01]">
            <div class="relative flex-1 group">
                <i data-lucide="search"
                    class="absolute left-5 top-1/2 -translate-y-1/2 w-4 h-4 text-zinc-600 group-focus-within:text-indigo-500 transition-colors"></i>
                <input type="text" id="globalSearch" placeholder="Rechercher une référence, un nom, une finition..."
                    class="w-full h-11 pl-14 pr-6 text-sm font-semibold">
            </div>
            <div class="flex items-center gap-4 shrink-0">
                <select id="filterFournisseur"
                    class="h-11 px-6 text-[10px] font-black uppercase tracking-widest min-w-[200px]"></select>
                <select id="filterType"
                    class="h-11 px-6 text-[10px] font-black uppercase tracking-widest min-w-[200px]"></select>
                <select id="filterSerie"
                    class="h-11 px-6 text-[10px] font-black uppercase tracking-widest min-w-[200px]"></select>
                <button id="resetFilters"
                    class="action-btn h-11 px-6 gap-3 text-[10px] font-black w-auto rounded-2xl hover:bg-white/5">
                    <i data-lucide="refresh-cw" class="w-4 h-4"></i>
                    <span>RÉINITIALISER</span>
                </button>
            </div>
        </div>
    </header>

    <main class="flex-1 relative overflow-hidden flex flex-col">
        <div id="catalogueView" class="flex-1 flex flex-col overflow-hidden relative">
            <div id="loadingOverlay"
                class="absolute inset-0 flex items-center justify-center bg-[#050507]/95 z-40 transition-opacity duration-700">
                <div class="text-center">
                    <div
                        class="w-12 h-12 border-4 border-indigo-500/5 border-t-indigo-500 rounded-full animate-spin mb-6 mx-auto">
                    </div>
                    <p class="text-indigo-500 font-black text-[9px] uppercase tracking-[0.4em] animate-pulse">Arts Alu
                        Intelligence</p>
                </div>
            </div>
            <div id="itemsGrid" class="grid-layout flex-1 overflow-y-auto scroll-smooth no-scrollbar view-compact">
            </div>

            <div id="emptyState"
                class="hidden flex-1 flex flex-col items-center justify-center p-20 text-center animate-fade">
                <i data-lucide="search-x" class="w-20 h-20 text-zinc-900 mb-8 outline-none"></i>
                <h3 class="text-2xl font-black mb-3">Aucun produit trouvé</h3>
                <p class="text-zinc-500 text-sm font-medium">Réessayez avec d'autres mots-clés ou filtres.</p>
            </div>
            <div id="loadMoreContainer"
                class="p-5 flex justify-center bg-transparent hidden border-t border-white/[0.02] shrink-0">
                <button id="loadMoreBtn"
                    class="px-10 py-3 bg-indigo-600 hover:bg-indigo-500 text-white rounded-xl text-[9px] font-black tracking-[0.2em] transition-all hover:scale-105 active:scale-95 shadow-xl shadow-indigo-600/20">CHARGER
                    LA SUITE</button>
            </div>
        </div>

        <div id="needsListView" class="hidden flex-1 flex-col overflow-y-auto p-16">
            <div class="max-w-6xl mx-auto w-full">
                <div class="flex items-center justify-between mb-12">
                    <div>
                        <h1 class="text-5xl font-black text-white tracking-tighter">Besoins</h1>
                        <p class="text-zinc-500 font-bold mt-2 uppercase text-[10px] tracking-[0.3em]">Gestion de
                            commande simplifiée</p>
                    </div>
                    <button onclick="clearNeeds()"
                        class="px-8 py-4 bg-red-600/5 hover:bg-red-600 text-red-500 hover:text-white rounded-2xl text-[10px] font-black transition-all border border-red-500/10">VIDER
                        LA LISTE</button>
                </div>
                <div class="bg-zinc-900/30 rounded-[2rem] overflow-hidden border border-white/[0.03] shadow-2xl">
                    <table class="w-full text-left">
                        <thead
                            class="bg-white/5 text-[9px] uppercase font-black text-indigo-400/70 tracking-[0.2em] border-b border-white/[0.03]">
                            <tr>
                                <th class="p-8">Origine</th>
                                <th>Réf. Article</th>
                                <th>Description Produit</th>
                                <th class="text-center">Besoin</th>
                                <th class="text-center">En Stock</th>
                                <th class="text-center">Manquant</th>
                                <th class="text-center">Action</th>
                            </tr>
                        </thead>
                        <tbody id="needsTableBody" class="divide-y divide-white/[0.03] text-sm font-bold text-white/90">
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <div id="imageModal"
        class="hidden fixed inset-0 z-[60] flex items-center justify-center bg-black/98 backdrop-blur-3xl transition-all duration-500 cursor-zoom-out"
        onclick="closeVisualizer()">
        <img id="modalImage" src=""
            class="max-w-[90vw] max-h-[85vh] object-contain rounded-3xl shadow-well transform scale-95 transition-transform duration-500">
    </div>

    <script src="data.js"></script>
    <script>
        const INCREMENT = 52;
        let groupedData = [], filteredData = [], displayCount = INCREMENT;
        let favorites = JSON.parse(localStorage.getItem('art-favs') || '[]');
        let needs = JSON.parse(localStorage.getItem('art-needs') || '[]');
        let isDarkMode = localStorage.getItem('theme') !== 'light';
        let showOnlyFavs = false;
        let currentView = 'compact';

        const grid = document.getElementById('itemsGrid');
        const searchInput = document.getElementById('globalSearch');
        const loadingOverlay = document.getElementById('loadingOverlay');
        const favCountBadge = document.getElementById('favCountBadge');
        const fFour = document.getElementById('filterFournisseur');
        const fType = document.getElementById('filterType');
        const fSerie = document.getElementById('filterSerie');

        if (!isDarkMode) document.body.classList.add('light-mode');

        function startApp() {
            toggleFS();
            document.getElementById('startOverlay').style.transform = 'translateY(-100%)';
            setTimeout(() => document.getElementById('startOverlay').classList.add('hidden'), 1000);
        }

        window.toggleFS = () => {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(() => { });
            } else {
                if (document.exitFullscreen) document.exitFullscreen();
            }
        };

        function processData(data) {
            const map = new Map();
            data.forEach(item => {
                const key = `${item.reference}_${item.fournisseur || item.fabricant || ''}_${item.designation}`.toLowerCase();
                if (!map.has(key)) map.set(key, item);
                else {
                    const decor = String(item.decor || '').toUpperCase();
                    if (decor === '9010') map.set(key, item);
                    else if ((decor.includes('BRUT') || decor === 'BT') && String(map.get(key).decor || '').toUpperCase() !== '9010') map.set(key, item);
                }
            });
            return Array.from(map.values());
        }

        function formatName(name) {
            if (!name) return "";
            return name
                .replace(/([a-zA-Z])([0-9])/g, '$1 $2')
                .replace(/([0-9])([a-zA-Z])/g, '$1 $2')
                .replace(/\+/g, ' + ')
                .replace(/\s+/g, ' ')
                .trim();
        }

        async function init() {
            try {
                if (typeof lucide !== 'undefined') lucide.createIcons();
                let retries = 0;
                while (!window.ART_DATA && retries < 40) { await new Promise(r => setTimeout(r, 200)); retries++; }
                if (!window.ART_DATA) throw new Error("Base de données indisponible.");

                groupedData = processData(window.ART_DATA);

                // Initial filter options setup
                updateFilterOptions();
                applyFilters();

                updateFavCount();
                loadingOverlay.style.opacity = '0';
                setTimeout(() => loadingOverlay.classList.add('hidden'), 700);
            } catch (err) {
                loadingOverlay.innerHTML = `<p class="text-red-500 font-black uppercase tracking-[0.2em]">${err.message}</p>`;
            }
        }

        function updateFilterOptions() {
            const currentFour = fFour.value;
            const currentType = fType.value;
            const currentSerie = fSerie.value;

            const availableFours = new Set();
            const availableTypes = new Set();
            const availableSeries = new Set();

            groupedData.forEach(d => {
                const matchFour = !currentFour || d.fournisseur === currentFour;
                const matchType = !currentType || d.type === currentType;
                const matchSerie = !currentSerie || d.serie === currentSerie;

                if (matchType && matchSerie) if (d.fournisseur) availableFours.add(d.fournisseur);
                if (matchFour && matchSerie) if (d.type) availableTypes.add(d.type);
                if (matchFour && matchType) if (d.serie) availableSeries.add(d.serie);
            });

            fillSelect(fFour, Array.from(availableFours).sort(), "TOUS LES FOURNISSEURS", currentFour);
            fillSelect(fType, Array.from(availableTypes).sort(), "TYPE D'ARTICLE", currentType);
            fillSelect(fSerie, Array.from(availableSeries).sort(), "SÉRIE / GAMME", currentSerie);
        }

        function fillSelect(sel, vals, lab, currentVal) {
            sel.innerHTML = `<option value="">${lab}</option>`;
            vals.forEach(v => {
                const o = document.createElement('option');
                o.value = v;
                o.textContent = v;
                if (v === currentVal) o.selected = true;
                sel.appendChild(o);
            });
        }

        function applyFilters(sourceElement) {
            if (sourceElement) updateFilterOptions();

            const q = searchInput.value.toLowerCase().trim();
            const four = fFour.value, type = fType.value, serie = fSerie.value;

            filteredData = groupedData.filter(item => {
                const id = `${item.reference}_${item.fournisseur || item.fabricant || ''}`.toLowerCase();
                if (showOnlyFavs && !favorites.includes(id)) return false;
                const matchSearch = !q || String(item.reference).toLowerCase().includes(q) || String(item.designation).toLowerCase().includes(q);
                return matchSearch && (!four || item.fournisseur === four) && (!type || item.type === type) && (!serie || item.serie === serie);
            });


            document.getElementById('matchCount').textContent = filteredData.length;
            displayCount = INCREMENT;
            render();
        }

        function changeViewMode(mode) {
            const views = ['grid', 'compact', 'mini', 'list'];
            views.forEach(v => grid.classList.remove(`view-${v}`));
            grid.classList.add(`view-${mode}`);
            currentView = mode;
            render();
        }

        function render() {
            grid.innerHTML = '';
            const items = filteredData.slice(0, displayCount);
            if (!items.length) { document.getElementById('emptyState').classList.remove('hidden'); return; }
            document.getElementById('emptyState').classList.add('hidden');

            items.forEach((it, idx) => {
                const id = `${it.reference}_${it.fournisseur || it.fabricant || ''}`.toLowerCase();
                const isFav = favorites.includes(id), isNeed = needs.some(n => n.id === id);

                const conditVal = Number(it.condit || it.conditionnement || 1);
                const unitVente = String(it.unit_vente || '').toUpperCase();
                const multiplier = (unitVente === 'M' || unitVente === 'PC' || unitVente === 'ML') ? conditVal : 1;

                const pxP = (Number(it.px_public || 0) * multiplier).toFixed(2);
                const pxR = (Number(it.px_remise || 0) * multiplier).toFixed(2);

                const card = document.createElement('div');
                card.className = `item-card animate-fade ${currentView === 'list' ? 'flex-row items-center' : ''}`;
                card.style.animationDelay = `${(idx % 40) * 15}ms`;

                const conditHtml = multiplier > 1 ? `
                    <div class="flex items-center gap-2 text-[8px] font-black text-indigo-500 underline underline-offset-4 decoration-indigo-500/20 mt-2 uppercase tracking-widest">
                        <i data-lucide="package" class="w-3 h-3 text-indigo-500"></i>
                        <span>LOT DE ${conditVal} ${it.unit_condit || 'U'}</span>
                    </div>` : '';

                const img = it.image ?
                    `<div class="img-container" onclick="openVisualizer('${it.image}')"><img src="${it.image}"></div>` :
                    `<div class="img-container opacity-5"><i data-lucide="image" class="w-6 h-6"></i></div>`;

                if (currentView === 'list') {
                    card.innerHTML = `
                        <div class="flex items-center gap-6 w-full">
                            ${img}
                            <span class="mono shrink-0">${it.reference}</span>
                            ${currentView !== 'mini' ? `<span class="badge uppercase shrink-0">${it.type || 'Plein'}</span>` : ''}
                            <span class="text-[8px] font-black text-indigo-500/40 uppercase tracking-[0.2em] shrink-0 w-32 truncate">${it.fournisseur || '-'}</span>
                            <h3 class="truncate flex-1">${formatName(it.designation)}</h3>
                            ${conditHtml}
                            <div class="price-grid">
                                <div class="flex flex-col"><span class="price-label">Catalogue</span><span class="price-value">${pxP}€</span></div>
                                <div class="flex flex-col items-end"><span class="price-label text-emerald-500 font-black">Net HT</span><span class="price-remise">${pxR}€</span></div>
                            </div>
                            <div class="relative flex flex-row gap-3 z-50">
                                <button class="action-btn fav-btn ${isFav ? 'active' : ''}" onclick="toggleF(event, '${id}')"><i data-lucide="star" class="w-4 h-4 ${isFav ? 'fill-current' : ''}"></i></button>
                                <button class="action-btn ${isNeed ? 'active' : ''}" onclick="toggleN(event, '${id}', ${idx})"><i data-lucide="${isNeed ? 'check-circle' : 'plus-circle'}" class="w-4 h-4"></i></button>
                            </div>
                        </div>`;
                } else {
                    card.innerHTML = `
                        <div class="absolute top-4 right-4 flex flex-col gap-3 z-50">
                            <button class="action-btn fav-btn ${isFav ? 'active' : ''}" onclick="toggleF(event, '${id}')"><i data-lucide="star" class="w-4 h-4 ${isFav ? 'fill-current' : ''}"></i></button>
                            <button class="action-btn ${isNeed ? 'active' : ''}" onclick="toggleN(event, '${id}', ${idx})"><i data-lucide="${isNeed ? 'check-circle' : 'plus-circle'}" class="w-4 h-4"></i></button>
                        </div>
                        ${img}
                        <div class="card-content flex-1">
                            <div class="flex items-center gap-3 mb-2">
                                <span class="mono">${it.reference}</span>
                                ${currentView !== 'mini' ? `<span class="badge uppercase">${it.type || 'Plein'}</span>` : ''}
                            </div>
                            <div class="text-[8px] font-black text-indigo-500/40 uppercase tracking-[0.2em] mb-2">${it.fournisseur || '-'}</div>
                            <h3>${formatName(it.designation)}</h3>
                            ${conditHtml}
                            <div class="price-grid mt-auto">
                                <div class="flex flex-col"><span class="price-label">Catalogue</span><span class="price-value">${pxP}€</span></div>
                                <div class="flex flex-col items-end"><span class="price-label text-emerald-500 font-black">Net HT</span><span class="price-remise">${pxR}€</span></div>
                            </div>
                        </div>`;
                }
                grid.appendChild(card);
            });
            if (typeof lucide !== 'undefined') lucide.createIcons();
            document.getElementById('loadMoreContainer').classList.toggle('hidden', displayCount >= filteredData.length);
        }

        window.toggleF = (e, id) => {
            e.stopPropagation(); const i = favorites.indexOf(id);
            if (i > -1) favorites.splice(i, 1); else favorites.push(id);
            localStorage.setItem('art-favs', JSON.stringify(favorites));
            updateFavCount(); if (showOnlyFavs) applyFilters(); else render();
        };

        window.toggleN = (e, id, idx) => {
            e.stopPropagation(); const it = filteredData[idx]; const i = needs.findIndex(n => n.id === id);
            if (i > -1) needs.splice(i, 1); else needs.push({ id, reference: it.reference, designation: it.designation, fournisseur: it.fournisseur, need: 0, stock: 0 });
            localStorage.setItem('art-needs', JSON.stringify(needs));
            render();
        };

        function updateFavCount() {
            const c = favorites.length; favCountBadge.textContent = c; favCountBadge.classList.toggle('hidden', c === 0);
        }

        window.switchView = (v) => {
            document.getElementById('catalogueView').classList.toggle('hidden', v !== 'catalogue');
            document.getElementById('needsListView').classList.toggle('hidden', v !== 'needs');
            document.getElementById('tabCatalogue').classList.toggle('active', v === 'catalogue');
            document.getElementById('tabNeeds').classList.toggle('active', v === 'needs');
            if (v === 'needs') renderNeeds();
        };

        window.renderNeeds = () => {
            const b = document.getElementById('needsTableBody');
            b.innerHTML = needs.length ? '' : '<tr><td colspan="7" class="p-24 text-center opacity-20 font-black uppercase tracking-widest">Le panier est vide.</td></tr>';
            needs.forEach((n, idx) => {
                const tr = document.createElement('tr'); const diff = Math.max(0, n.need - n.stock);
                tr.innerHTML = `
                    <td class="p-8 font-black uppercase text-indigo-500/50 tracking-widest">${n.fournisseur || '-'}</td>
                    <td><span class="mono text-zinc-400">${n.reference}</span></td>
                    <td class="font-black text-white leading-tight max-w-sm">${n.designation}</td>
                    <td class="text-center"><input type="number" class="w-24 text-center py-3 rounded-2xl font-black bg-zinc-800" value="${n.need}" onchange="updateNeedV(${idx}, 'need', this.value)"></td>
                    <td class="text-center"><input type="number" class="w-24 text-center py-3 rounded-2xl font-black bg-zinc-800" value="${n.stock}" onchange="updateNeedV(${idx}, 'stock', this.value)"></td>
                    <td class="text-center"><span class="badge ${diff > 0 ? 'bg-indigo-600 text-white shadow-xl shadow-indigo-600/30 scale-110' : ''}">${diff}</span></td>
                    <td class="p-8 text-center"><button onclick="removeN(${idx})" class="p-3 text-red-500/20 hover:text-red-500 hover:bg-red-500/10 rounded-xl transition-all"><i data-lucide="trash-2" class="w-5 h-5"></i></button></td>`;
                b.appendChild(tr);
            });
            if (typeof lucide !== 'undefined') lucide.createIcons();
        };

        window.updateNeedV = (i, f, v) => { needs[i][f] = parseInt(v) || 0; localStorage.setItem('art-needs', JSON.stringify(needs)); renderNeeds(); };
        window.removeN = (i) => { needs.splice(i, 1); localStorage.setItem('art-needs', JSON.stringify(needs)); renderNeeds(); };
        window.clearNeeds = () => { if (confirm("Supprimer toute la sélection ?")) { needs = []; localStorage.setItem('art-needs', "[]"); renderNeeds(); } };

        window.openVisualizer = (s) => {
            if (!s) return;
            const m = document.getElementById('imageModal');
            const img = document.getElementById('modalImage');
            img.src = s; m.classList.remove('hidden');
            setTimeout(() => img.classList.remove('scale-95'), 10);
        };
        window.closeVisualizer = () => {
            const m = document.getElementById('imageModal');
            const img = document.getElementById('modalImage');
            img.classList.add('scale-95');
            setTimeout(() => m.classList.add('hidden'), 500);
        };

        searchInput.addEventListener('input', applyFilters);
        fFour.addEventListener('change', (e) => applyFilters(e.target));
        fType.addEventListener('change', (e) => applyFilters(e.target));
        fSerie.addEventListener('change', (e) => applyFilters(e.target));
        document.getElementById('resetFilters').addEventListener('click', () => { fFour.value = ""; fType.value = ""; fSerie.value = ""; searchInput.value = ""; applyFilters(); });
        document.getElementById('toggleFavFilter').addEventListener('click', () => { showOnlyFavs = !showOnlyFavs; document.getElementById('toggleFavFilter').classList.toggle('active', showOnlyFavs); applyFilters(); });
        document.getElementById('modeToggle').addEventListener('click', () => { isDarkMode = !isDarkMode; document.body.classList.toggle('light-mode', !isDarkMode); localStorage.setItem('theme', isDarkMode ? 'dark' : 'light'); });
        document.getElementById('loadMoreBtn').addEventListener('click', () => { displayCount += INCREMENT; render(); });

        init();
    </script>
</body>

</html>
